<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestãoPro — Assistência Técnica</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>

<!-- AUTH -->
<div id="authWrap" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
      <h1>GestãoPro</h1>
      <p>Sistema de gestão para assistência técnica</p>
    </div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab on" onclick="authTab('login')">Entrar</button>
        <button class="auth-tab" onclick="authTab('reg')">Criar conta</button>
      </div>
      <div id="authLogin">
        <div class="form-field"><label>E-mail</label><input class="inp" id="lEmail" type="email" placeholder="seu@email.com" autocomplete="email"></div>
        <div class="form-field"><label>Senha</label><input class="inp" id="lSenha" type="password" placeholder="••••••••" autocomplete="current-password"></div>
        <div style="color:var(--red);font-size:13px;height:18px;margin-bottom:8px" id="lErr"></div>
        <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()">Entrar</button>
      </div>
      <div id="authReg" style="display:none">
        <div class="form-field"><label>Nome</label><input class="inp" id="rNome" placeholder="Seu nome"></div>
        <div class="form-field"><label>Nome da loja</label><input class="inp" id="rLoja" placeholder="Minha Assistência Técnica"></div>
        <div class="form-field"><label>E-mail</label><input class="inp" id="rEmail" type="email" placeholder="seu@email.com"></div>
        <div class="form-field"><label>Senha</label><input class="inp" id="rSenha" type="password" placeholder="Mínimo 6 caracteres"></div>
        <div style="color:var(--red);font-size:13px;height:18px;margin-bottom:8px" id="rErr"></div>
        <button class="btn btn-primary btn-block btn-lg" onclick="doRegister()">Criar conta grátis</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appWrap" class="app" style="display:none">
  <div class="scrim" id="scrim" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
      <div><div class="brand-name">GestãoPro</div><div class="brand-sub" id="navLoja">Assistência</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="user-av" id="userAv">?</div>
        <div><div class="user-nm" id="userName">–</div><div class="user-email" id="userEmail">–</div></div>
      </div>
      <button class="btn-logout" onclick="logout()">⟵ Sair da conta</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="mobile-toggle" onclick="openSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title"><h2 id="pageTitle">Painel</h2><p id="pageSub">Visão geral</p></div>
      <div class="topbar-right">
        <span class="clock tabular" id="clock"></span>
        <div class="caixa-badge"><span class="dot"></span><span id="caixaHoje">R$ 0,00</span></div>
      </div>
    </header>
    <main class="view" id="view"></main>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>
<div id="printZone" style="display:none"></div>

<script>
/* =========================================================
   GestãoPro — SPA Frontend
   ========================================================= */
const API = '';  // mesmo domínio
let TOKEN = localStorage.getItem('gp_token') || '';
let ME = null;
let CURRENT = 'dashboard';

/* =====================================================
   FIX: VIEWS e VIEWS_register declarados PRIMEIRO,
   antes de qualquer chamada a VIEWS_register(...)
   ===================================================== */
const VIEWS = {};
function VIEWS_register(k, fn) { VIEWS[k] = fn; }

/* ---------- SVG icons ---------- */
const I = {
  dash:    '<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>',
  pdv:     '<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M2 10h20M7 21h10"/>',
  os:      '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
  clientes:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',
  produtos:'<path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/>',
  caixa:   '<rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="12" cy="12" r="3"/>',
  relat:   '<path d="M3 3v18h18M7 16l4-6 4 4 5-7"/>',
  config:  '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  plus:    '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  edit:    '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  trash:   '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  search:  '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  x:       '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  check:   '<polyline points="20 6 9 17 4 12"/>',
  print:   '<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>',
  arrow:   '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
  alert:   '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  wa:      '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',
  photo:   '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
  sign:    '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
  up:      '<polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  down:    '<polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  shield:  '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
};
const svg = (p, s=2) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${s}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

/* ---------- Utils ---------- */
const $ = (s, el=document) => el.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = v => 'R$ ' + (Number(v)||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('pt-BR') : '—';
const fmtDT   = iso => iso ? new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
const today   = () => new Date().toISOString().slice(0,10);
const num     = v => { const n=parseFloat(String(v||0).replace(',','.')); return isNaN(n)?0:n; };

function toast(msg, err=false) {
  const t = $('#toast');
  t.innerHTML = svg(err?I.alert:I.check) + esc(msg);
  t.className = 'toast show' + (err?' err':' ok');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 2800);
}

/* ---------- API ---------- */
async function api(method, path, body) {
  const res = await fetch(API+'/api'+path, {
    method, headers: { 'Content-Type':'application/json', ...(TOKEN?{Authorization:'Bearer '+TOKEN}:{}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || 'Erro ' + res.status);
  return data;
}
async function apiForm(path, formData) {
  const res = await fetch(API+'/api'+path, { method:'POST', headers:{Authorization:'Bearer '+TOKEN}, body:formData });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error||'Erro');
  return data;
}

/* ---------- Auth ---------- */
function authTab(t) {
  ['Login','Reg'].forEach(n => { $(`#auth${n}`).style.display=n.toLowerCase()===t?'block':'none'; });
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('on', i===(t==='login'?0:1)));
}
async function doLogin() {
  const email=$('#lEmail').value.trim(), senha=$('#lSenha').value;
  $('#lErr').textContent = '';
  try { const d=await api('POST','/auth/login',{email,senha}); afterAuth(d); } catch(e){$('#lErr').textContent=e.message;}
}
async function doRegister() {
  const nome=$('#rNome').value.trim(),loja=$('#rLoja').value.trim(),email=$('#rEmail').value.trim(),senha=$('#rSenha').value;
  if(!nome||!email||!senha)return($('#rErr').textContent='Preencha todos os campos');
  $('#rErr').textContent = '';
  try { const d=await api('POST','/auth/register',{nome,email,senha,loja}); afterAuth(d); } catch(e){$('#rErr').textContent=e.message;}
}
function afterAuth(d) {
  TOKEN=d.token; ME=d.user; localStorage.setItem('gp_token',TOKEN);
  $('#authWrap').style.display='none'; $('#appWrap').style.display='flex';
  initApp();
}
function logout() {
  TOKEN=''; ME=null; localStorage.removeItem('gp_token');
  location.reload();
}

/* ---------- Nav pages ---------- */
const PAGES = [
  {k:'dashboard', lbl:'Painel',             icon:I.dash,     group:'Geral',    title:'Painel',              sub:'Visão geral do negócio'},
  {k:'pdv',       lbl:'PDV / Caixa',         icon:I.pdv,      group:'Operação', title:'PDV — Frente de Caixa',sub:'Vendas rápidas'},
  {k:'ordens',    lbl:'Ordens de Serviço',   icon:I.os,       group:'Operação', title:'Ordens de Serviço',   sub:'Consertos e atendimentos'},
  {k:'clientes',  lbl:'Clientes',            icon:I.clientes, group:'Cadastros',title:'Clientes',             sub:'Base de clientes (CRM)'},
  {k:'produtos',  lbl:'Produtos & Estoque',  icon:I.produtos, group:'Cadastros',title:'Produtos & Estoque',   sub:'Catálogo e inventário'},
  {k:'caixa',     lbl:'Financeiro',          icon:I.caixa,    group:'Gestão',   title:'Financeiro / Caixa',  sub:'Entradas e saídas'},
  {k:'relatorios',lbl:'Relatórios',          icon:I.relat,    group:'Gestão',   title:'Relatórios',          sub:'Desempenho e análises'},
  {k:'config',    lbl:'Configurações',       icon:I.config,   group:'Gestão',   title:'Configurações',       sub:'Loja e preferências'},
];
let _badges = {};
function renderNav() {
  const groups=[...new Set(PAGES.map(p=>p.group))];
  $('#sidebarNav').innerHTML=groups.map(g=>`
    <div class="nav-group">${g}</div>
    ${PAGES.filter(p=>p.group===g).map(p=>`
      <button class="nav-item${CURRENT===p.k?' active':''}" onclick="go('${p.k}')">
        ${svg(p.icon)}<span>${esc(p.lbl)}</span>
        ${_badges[p.k]?`<span class="nav-badge">${_badges[p.k]}</span>`:''}
      </button>`).join('')}`).join('');
}
async function updateBadges() {
  try {
    const d = await api('GET','/dashboard');
    _badges = { ordens: d.alertas.osAtrasadas||0, produtos: d.alertas.baixoEstoque||0 };
    $('#caixaHoje').textContent = money(d.hoje.faturamento);
    renderNav();
    return d;
  } catch(e){}
}
function go(k, sub) {
  CURRENT=k; closeSidebar();
  const p=PAGES.find(x=>x.k===k);
  $('#pageTitle').textContent=p.title; $('#pageSub').textContent=p.sub;
  VIEWS[k](sub);
}

/* ---------- Modal ---------- */
function modal(html, wide, xl) {
  $('#modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal${wide?' wide':''}${xl?' xl':''}">${html}</div></div>`;
}
function closeModal(){$('#modalRoot').innerHTML='';}
function confirmDel(msg, onYes) {
  modal(`<div class="modal-header"><div><h3>Confirmar exclusão</h3><p>${esc(msg)}</p></div></div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
  <button class="btn btn-danger" onclick="closeModal();(${onYes.toString()})()">Excluir</button></div>`);
}

/* ---------- Badges OS ---------- */
const OS_STATUS=[
  {k:'aberta',    lbl:'Aberta',              cls:'badge-blue'},
  {k:'analise',   lbl:'Em análise',          cls:'badge-amber'},
  {k:'aprovacao', lbl:'Aguard. aprovação',   cls:'badge-amber'},
  {k:'reparo',    lbl:'Em reparo',           cls:'badge-violet'},
  {k:'pronta',    lbl:'Pronta p/ retirada',  cls:'badge-green'},
  {k:'entregue',  lbl:'Entregue',            cls:'badge-gray'},
];
const prioMap = {normal:'',urgente:'badge-amber',critica:'badge-red'};
const osStatus = k => OS_STATUS.find(s=>s.k===k)||OS_STATUS[0];
const osTotal  = o => num(o.valorServico)+(o.pecas||[]).reduce((s,p)=>s+num(p.valor)*num(p.qtd),0);
const waLink   = (tel,msg) => {const d=(tel||'').replace(/\D/g,'');if(!d)return null;const f=d.length<=11?'55'+d:d;return 'https://wa.me/'+f+'?text='+encodeURIComponent(msg);};

/* ===================================================
   VIEWS
   =================================================== */

/* ---- DASHBOARD ---- */
VIEWS_register('dashboard', async function() {
  $('#view').innerHTML = `<div style="text-align:center;padding:40px;color:var(--ink-3)">${svg(I.relat)} Carregando...</div>`;
  let d;
  try { d = await api('GET','/dashboard'); } catch(e){ $('#view').innerHTML=`<div class="empty">${svg(I.alert)}<h4>Erro ao carregar</h4><p>${esc(e.message)}</p></div>`; return; }
  _badges = { ordens: d.alertas.osAtrasadas||0, produtos: d.alertas.baixoEstoque||0 };
  $('#caixaHoje').textContent = money(d.hoje.faturamento);
  renderNav();

  const lucroCorHoje = d.hoje.lucro>=0?'var(--green)':'var(--red)';
  const lucroCorMes  = d.mes.lucro>=0?'var(--green)':'var(--red)';

  const max30 = Math.max(1,...d.grafico30.map(x=>x.entrada));
  const bars30 = d.grafico30.slice(-14).map(x=>`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:3px" title="${x.data}: ${money(x.entrada)}">
      <div style="width:100%;max-width:28px;height:${Math.max(3,x.entrada/max30*120)}px;border-radius:5px 5px 0 0;background:${x.entrada>0?'linear-gradient(180deg,var(--brand-l),var(--brand))':'var(--line)'}"></div>
      <span style="font-size:9px;color:var(--ink-3);white-space:nowrap">${x.data.slice(5)}</span>
    </div>`).join('');

  const pagEntries = Object.entries(d.pagamentosMes||{}).sort((a,b)=>b[1]-a[1]);
  const maxPag = Math.max(1,...pagEntries.map(e=>e[1]));

  $('#view').innerHTML = `
  <div class="stat-grid">
    <div class="stat"><div class="stat-ico ico-green">${svg(I.caixa)}</div><div class="stat-lbl">Faturamento hoje</div><div class="stat-val tabular">${money(d.hoje.faturamento)}</div><div class="stat-meta">${d.hoje.vendas} venda(s)</div></div>
    <div class="stat"><div class="stat-ico ico-brand">${svg(I.up)}</div><div class="stat-lbl">Lucro hoje</div><div class="stat-val tabular" style="color:${lucroCorHoje}">${money(d.hoje.lucro)}</div><div class="stat-meta">Descontando CMV e despesas</div></div>
    <div class="stat"><div class="stat-ico ico-violet">${svg(I.relat)}</div><div class="stat-lbl">Lucro no mês</div><div class="stat-val tabular" style="color:${lucroCorMes}">${money(d.mes.lucro)}</div><div class="stat-meta">Faturamento: ${money(d.mes.faturamento)}</div></div>
    <div class="stat"><div class="stat-ico ico-amber">${svg(I.os)}</div><div class="stat-lbl">OS em aberto</div><div class="stat-val tabular">${d.totais.osAbertas}</div><div class="stat-meta">${d.alertas.osProntas} pronta(s) · ${d.alertas.osAtrasadas} atrasada(s)</div></div>
    <div class="stat"><div class="stat-ico ico-blue">${svg(I.clientes)}</div><div class="stat-lbl">Clientes</div><div class="stat-val tabular">${d.totais.clientes}</div><div class="stat-meta">${d.totais.produtos} produtos</div></div>
    ${d.alertas.baixoEstoque?`<div class="stat" style="border-color:var(--red)"><div class="stat-ico ico-red">${svg(I.alert)}</div><div class="stat-lbl">Estoque baixo</div><div class="stat-val tabular" style="color:var(--red)">${d.alertas.baixoEstoque}</div><div class="stat-meta">Produtos abaixo do mínimo</div></div>`:''}
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">
    <div class="card">
      <div class="card-header"><h3>Faturamento últimos 14 dias</h3></div>
      <div class="card-body">
        <div style="display:flex;align-items:flex-end;gap:4px;height:140px">${bars30}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Pagamentos do mês</h3></div>
      <div class="card-body">
        ${pagEntries.length?`<div class="bar-chart">${pagEntries.map(([k,v])=>`<div class="bar-row"><span class="bar-label">${esc(k)}</span><div class="bar-track"><div class="bar-fill" style="width:${v/maxPag*100}%"></div></div><span class="bar-value">${money(v)}</span></div>`).join('')}</div>`:'<div class="empty" style="padding:20px"><p>Sem dados no mês.</p></div>'}
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div class="card">
      <div class="card-header"><h3>Ordens recentes</h3><div class="ml"><button class="btn btn-ghost btn-sm" onclick="go('ordens')">Ver todas</button></div></div>
      <div>
        ${d.osRecentes.length?d.osRecentes.map(o=>{const s=osStatus(o.status);return `
          <div style="display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line-2);cursor:pointer" onclick="go('ordens','${o._id}')">
            <div style="flex:1;min-width:0"><div class="t-name">#${o.numero} · ${esc(o.equipamento)}</div>
            <div class="t-sub">${o.cliente?esc(o.cliente.nome):'Sem cliente'}</div></div>
            <span class="badge ${s.cls}"><span class="d"></span>${s.lbl}</span>
          </div>`}).join(''):`<div class="empty" style="padding:30px">${svg(I.check)}<h4>Tudo em dia!</h4></div>`}

let _sigCtx=null,_sigDrawing=false;
function initSig(){
  const c=$('#sigPad');if(!c)return;
  _sigCtx=c.getContext('2d');_sigCtx.strokeStyle='#0d9488';_sigCtx.lineWidth=2.5;_sigCtx.lineCap='round';
  c.onpointerdown=e=>{_sigDrawing=true;_sigCtx.beginPath();_sigCtx.moveTo(e.offsetX,e.offsetY);c.classList.add('signed');};
  c.onpointermove=e=>{if(!_sigDrawing)return;_sigCtx.lineTo(e.offsetX,e.offsetY);_sigCtx.stroke();};
  c.onpointerup=c.onpointerleave=()=>{_sigDrawing=false;};
}
function clearSig(){if(_sigCtx){_sigCtx.clearRect(0,0,480,140);$('#sigPad').classList.remove('signed');}}

let _cxDe=today(), _cxAte=today();
VIEWS_register('caixa', async function(){
  let movs=[]; try{movs=await api('GET',`/caixa?de=${_cxDe}&ate=${_cxAte}`);}catch(e){toast(e.message,true);}
  const ent=movs.filter(m=>m.tipo==='entrada').reduce((s,m)=>s+m.valor,0);
  const sai=movs.filter(m=>m.tipo==='saida').reduce((s,m)=>s+m.valor,0);
  $('#view').innerHTML=`
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:8px"><label style="font-size:12.5px;font-weight:600">De</label><input type="date" class="inp" style="width:auto" value="${_cxDe}" onchange="_cxDe=this.value;VIEWS.caixa()"><label style="font-size:12.5px;font-weight:600">até</label><input type="date" class="inp" style="width:auto" value="${_cxAte}" onchange="_cxAte=this.value;VIEWS.caixa()"></div>
    <div class="chips"><button class="chip" onclick="_cxDe=_cxAte=today();VIEWS.caixa()">Hoje</button><button class="chip" onclick="setPeriodoCx(7)">7 dias</button><button class="chip" onclick="setPeriodoCx(30)">30 dias</button></div>
    <div class="spacer"></div>
    <button class="btn btn-ghost" onclick="lancamento('saida')">${svg(I.down)}Despesa</button>
    <button class="btn btn-primary" onclick="lancamento('entrada')">${svg(I.up)}Entrada manual</button>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-ico ico-green">${svg(I.up)}</div><div class="stat-lbl">Entradas</div><div class="stat-val tabular">${money(ent)}</div></div>
    <div class="stat"><div class="stat-ico ico-red">${svg(I.down)}</div><div class="stat-lbl">Saídas</div><div class="stat-val tabular" style="color:var(--red)">${money(sai)}</div></div>
    <div class="stat"><div class="stat-ico ico-brand">${svg(I.caixa)}</div><div class="stat-lbl">Saldo</div><div class="stat-val tabular" style="color:${ent-sai>=0?'var(--green)':'var(--red)'}">${money(ent-sai)}</div></div>
  </div>
  ${movs.length?`<div class="table-wrap"><table><thead><tr><th>Data/hora</th><th>Descrição</th><th>Categoria</th><th>Pagamento</th><th>Tipo</th><th>Valor</th><th></th></tr></thead><tbody>
  ${movs.map(m=>`<tr><td class="tabular">${fmtDT(m.createdAt)}</td><td class="t-name">${esc(m.descricao||'—')}</td><td><span class="badge badge-gray">${esc(m.categoria)}</span></td>
  <td>${esc(m.pagamento||'—')}</td><td><span class="badge ${m.tipo==='entrada'?'badge-green':'badge-red'}"><span class="d"></span>${m.tipo==='entrada'?'Entrada':'Saída'}</span></td>
  <td class="tabular" style="font-weight:700;color:${m.tipo==='entrada'?'var(--green)':'var(--red)'}">${m.tipo==='entrada'?'+':'−'}${money(m.valor)}</td>
  <td>${!m.ref?`<button class="btn-icon" onclick="delMovimento('${m._id}')">${svg(I.trash)}</button>`:''}</td></tr>`).join('')}</tbody></table></div>`
  :`<div class="card"><div class="empty">${svg(I.caixa)}<h4>Sem movimentações</h4><p>As vendas e serviços do período aparecem aqui.</p></div></div>`}`;
});
function setPeriodoCx(d){const a=new Date();_cxAte=today();a.setDate(a.getDate()-d+1);_cxDe=a.toISOString().slice(0,10);VIEWS.caixa();}
function lancamento(tipo){
  modal(`<div class="modal-header"><div><h3>${tipo==='entrada'?'Entrada manual':'Nova despesa'}</h3></div><button class="btn-icon close" onclick="closeModal()">${svg(I.x)}</button></div>
  <div class="modal-body">
    <div class="form-row form-row-2"><div class="form-field"><label>Descrição</label><input class="inp" id="l_desc" placeholder="${tipo==='entrada'?'Ex: Recebimento':'Ex: Conta de luz'}"></div>
    <div class="form-field"><label>Categoria</label><input class="inp" id="l_cat" value="${tipo==='entrada'?'Outros':'Despesa Operacional'}"></div></div>
    <div class="form-row form-row-2"><div class="form-field"><label>Valor *</label><input class="inp tabular" id="l_val" placeholder="0,00" inputmode="decimal"></div>
    <div class="form-field"><label>Pagamento</label><select class="inp" id="l_pag"><option value="">—</option>${(ME?.pagamentos||['Dinheiro','PIX']).map(p=>`<option>${esc(p)}</option>`).join('')}</select></div></div>
  </div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
  <button class="btn btn-primary" onclick="saveLancamento('${tipo}')">${svg(I.check)}Lançar</button></div>`);
  setTimeout(()=>$('#l_val').focus(),60);
}
async function saveLancamento(tipo){
  const val=num($('#l_val').value);if(val<=0)return toast('Valor inválido',true);
  try{await api('POST','/caixa',{tipo,categoria:$('#l_cat').value.trim()||'Outros',descricao:$('#l_desc').value.trim(),valor:val,pagamento:$('#l_pag').value});closeModal();toast('Lançado');VIEWS.caixa();}catch(e){toast(e.message,true);}
}
async function delMovimento(id){confirmDel('Excluir este lançamento?',async()=>{try{await api('DELETE',`/caixa/${id}`);toast('Excluído');VIEWS.caixa();}catch(e){toast(e.message,true);}});}

/* ---- RELATÓRIOS ---- */
let _relDe=(()=>{const a=new Date();a.setDate(a.getDate()-29);return a.toISOString().slice(0,10)})(), _relAte=today();
VIEWS_register('relatorios', async function(){
  let movs=[],os=[],vendas=[];
  try{[movs,os,vendas]=await Promise.all([api('GET',`/caixa?de=${_relDe}&ate=${_relAte}`),api('GET',`/ordens?status=entregue`),api('GET',`/vendas?de=${_relDe}&ate=${_relAte}`)]);}catch(e){toast(e.message,true);}
  const ent=movs.filter(m=>m.tipo==='entrada').reduce((s,m)=>s+m.valor,0);
  const sai=movs.filter(m=>m.tipo==='saida').reduce((s,m)=>s+m.valor,0);
  const cmv=vendas.filter(v=>!v.estornada).reduce((s,v)=>s+v.itens.reduce((si,i)=>si+(i.custo||0)*i.qtd,0),0);
  const lucro=ent-sai-cmv;
  const pmapa={};vendas.forEach(v=>v.itens.forEach(i=>{pmapa[i.nome]=(pmapa[i.nome]||0)+i.qtd;}));
  const topP=Object.entries(pmapa).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const maxP=Math.max(1,...topP.map(e=>e[1]));
  const pagMapa={};movs.filter(m=>m.tipo==='entrada'&&m.pagamento).forEach(m=>{pagMapa[m.pagamento]=(pagMapa[m.pagamento]||0)+m.valor;});
  const pagE=Object.entries(pagMapa).sort((a,b)=>b[1]-a[1]);const maxPag=Math.max(1,...pagE.map(e=>e[1]));
  $('#view').innerHTML=`
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:8px"><label style="font-size:12.5px;font-weight:600">De</label><input type="date" class="inp" style="width:auto" value="${_relDe}" onchange="_relDe=this.value;VIEWS.relatorios()"><label style="font-size:12.5px;font-weight:600">até</label><input type="date" class="inp" style="width:auto" value="${_relAte}" onchange="_relAte=this.value;VIEWS.relatorios()"></div>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Faturamento</div><div class="stat-val tabular">${money(ent)}</div></div>
    <div class="stat"><div class="stat-lbl">Despesas</div><div class="stat-val tabular" style="color:var(--red)">${money(sai)}</div></div>
    <div class="stat"><div class="stat-lbl">CMV (custo mercad.)</div><div class="stat-val tabular" style="color:var(--amber)">${money(cmv)}</div></div>
    <div class="stat"><div class="stat-lbl">Lucro líquido</div><div class="stat-val tabular" style="color:${lucro>=0?'var(--green)':'var(--red)'}">${money(lucro)}</div></div>
    <div class="stat"><div class="stat-lbl">Ticket médio</div><div class="stat-val tabular" style="font-size:18px">${money(vendas.length?vendas.filter(v=>!v.estornada).reduce((s,v)=>s+v.total,0)/Math.max(1,vendas.filter(v=>!v.estornada).length):0)}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div class="card"><div class="card-header"><h3>Produtos mais vendidos</h3></div><div class="card-body">
      ${topP.length?`<div class="bar-chart">${topP.map(([nm,qtd])=>`<div class="bar-row"><span class="bar-label">${esc(nm)}</span><div class="bar-track"><div class="bar-fill" style="width:${qtd/maxP*100}%"></div></div><span class="bar-value">${qtd} un.</span></div>`).join('')}</div>`:`<div class="empty" style="padding:20px"><p>Sem vendas no período.</p></div>`}
    </div></div>
    <div class="card"><div class="card-header"><h3>Recebimentos por pagamento</h3></div><div class="card-body">
      ${pagE.length?`<div class="bar-chart">${pagE.map(([p,v])=>`<div class="bar-row"><span class="bar-label">${esc(p)}</span><div class="bar-track"><div class="bar-fill" style="width:${v/maxPag*100}%"></div></div><span class="bar-value">${money(v)}</span></div>`).join('')}</div>`:`<div class="empty" style="padding:20px"><p>Sem dados.</p></div>`}
    </div></div>
  </div>`;
});

/* ---- CONFIGURAÇÕES ---- */
VIEWS_register('config', async function(){
  let me; try{me=await api('GET','/auth/me');}catch(e){me=ME||{};}
  $('#view').innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div class="card"><div class="card-header"><h3>Dados da loja</h3></div><div class="card-body">
      <div class="form-field"><label>Nome da loja</label><input class="inp" id="cf_loja" value="${esc(me.loja||'')}"></div>
      <div class="form-row form-row-2"><div class="form-field"><label>Garantia padrão (dias)</label><input class="inp tabular" id="cf_gar" value="${me.garantiaDias||90}" inputmode="numeric"></div>
      <div class="form-field"><label>Preço aluguel/hora (R$)</label><input class="inp tabular" id="cf_ph" value="${me.precoHora||8}" inputmode="decimal"></div></div>
      <button class="btn btn-primary" onclick="saveConfigLoja()">${svg(I.check)}Salvar</button>
    </div></div>
    <div class="card"><div class="card-header"><h3>Técnicos</h3></div><div class="card-body">
      <div class="form-field"><label>Um por linha</label><textarea class="inp" id="cf_tec" style="min-height:80px">${(me.tecnicos||[]).join('\n')}</textarea></div>
      <button class="btn btn-primary" onclick="saveConfigListas()">${svg(I.check)}Salvar</button>
    </div></div>
    <div class="card"><div class="card-header"><h3>Formas de pagamento</h3></div><div class="card-body">
      <div class="form-field"><label>Uma por linha</label><textarea class="inp" id="cf_pag" style="min-height:80px">${(me.pagamentos||[]).join('\n')}</textarea></div>
      <button class="btn btn-primary" onclick="saveConfigListas()">${svg(I.check)}Salvar</button>
    </div></div>
    <div class="card"><div class="card-header"><h3>Conta</h3></div><div class="card-body">
      <div class="form-field"><label>Nome</label><input class="inp" id="cf_nome" value="${esc(me.nome||'')}"></div>
      <div class="form-field"><label>E-mail</label><input class="inp" id="cf_email" type="email" value="${esc(me.email||'')}"></div>
      <button class="btn btn-ghost btn-danger" onclick="logout()" style="margin-top:8px">Sair da conta</button>
    </div></div>
  </div>`;
});
async function saveConfigLoja(){
  try{const d=await api('PUT','/auth/config',{loja:$('#cf_loja').value.trim(),garantiaDias:Math.round(num($('#cf_gar').value)),precoHora:num($('#cf_ph').value)});ME=Object.assign(ME||{},d);$('#navLoja').textContent=d.loja;toast('Configurações salvas');}catch(e){toast(e.message,true);}
}
async function saveConfigListas(){
  const lines=id=>$(id).value.split('\n').map(s=>s.trim()).filter(Boolean);
  try{const d=await api('PUT','/auth/config',{tecnicos:lines('#cf_tec'),pagamentos:lines('#cf_pag')});ME=Object.assign(ME||{},d);toast('Listas salvas');}catch(e){toast(e.message,true);}
}

/* ---- Init ---- */
async function initApp(){
  try{ ME = await api('GET','/auth/me'); }catch(e){}
  if(ME){ $('#userName').textContent=ME.nome||''; $('#userEmail').textContent=ME.email||''; $('#navLoja').textContent=ME.loja||''; $('#userAv').textContent=(ME.nome||'?')[0].toUpperCase(); }
  renderNav(); updateBadges();
  setInterval(updateBadges, 30000);
  setInterval(()=>{ $('#clock').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }, 15000);
  $('#clock').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  go('dashboard');
}
function openSidebar(){$('#sidebar').classList.add('open');$('#scrim').classList.add('show');}
function closeSidebar(){$('#sidebar').classList.remove('open');$('#scrim').classList.remove('show');}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.querySelectorAll('#authLogin input').forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));
document.querySelectorAll('#authReg input').forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();}));

// auto-login se tiver token salvo
if(TOKEN){
  $('#authWrap').style.display='none'; $('#appWrap').style.display='flex';
  initApp();
}
</script>
</body>
</html>
